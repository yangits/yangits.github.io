<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聊天室</title>
</head>
<style>
  div{
      font-size: 16px;
      background-color: rgb(216, 216, 216);
      width: 420px;
      text-align: center;
      margin: auto;
  }
  button{
      width: 150px;
      height: 25px;
  }
  textarea{
      resize: none;
      margin: 10px;
  }
  input{
      width: 200px;
      height: 25px;
      margin: 10px;
  }
</style>
<body>
  <div>
    <b>输入昵称:</b><input type="text" id="nickname" value="">
    <button type="button" id="join" onclick="joinroom()">加入聊天室</button>
    <button type="button" id="leave" onclick="leaveroom()" disabled="true">退出聊天室</button>
    <textarea id="input" cols="50" rows="3"></textarea>
    <button type="button" id="send" onclick="sendMsg()" disabled="true">发送</button>
    <textarea id="chatroom" cols="50" rows="25" readonly="true" disabled="true"> </textarea>
  </div>
  <script type="text/javascript">
    var nickname = document.getElementById("nickname");
    var input = document.getElementById("input");
    var chatroom = document.getElementById("chatroom");
    var send =document.getElementById("send")
    var processID
    var xmlhttp;
    if (window.XMLHttpRequest){// code for IE7+, Firefox, Chrome, Opera, Safari
            xmlhttp=new XMLHttpRequest();
        }else{// code for IE6, IE5
            xmlhttp=new ActiveXObject("Microsoft.XMLHTTP");
        }
    function loadXMLDoc(){
        xmlhttp.open("GET","/connect",true);
        xmlhttp.send();
        xmlhttp.onreadystatechange = function(){
            // console.log(xmlhttp.responseText);
            if (xmlhttp.readyState==4){
                xmlhttp_text=xmlhttp.responseText
                if(xmlhttp_text != chatroom.value){
                    chatroom.innerHTML=xmlhttp_text; 
                }}
        }
    }

    function joinroom(){
        if (nickname.value == ""){
            alert("昵称不能为空！")
        }
        else{
            nickname.disabled = "disabled"
            send.disabled=false
            join.disabled=true
            leave.disabled=false
            msg="/sendMsg/"+nickname.value+"/加入聊天室"
            xmlhttpmsg(msg)
            processID=self.setInterval("loadXMLDoc()",1000)
        }
    }
    function leaveroom(){
        window.clearInterval(processID)
        nickname.disabled = ""
        send.disabled=true
        join.disabled=false
        leave.disabled=true
        msg="/sendMsg/"+nickname.value+"/退出聊天室"
        xmlhttpmsg(msg)

    }
    function sendMsg(){
        if (input.value == ""){
            alert("发送信息不能为空！")
        }
        else{
            msg="/sendMsg/"+nickname.value+"/"+input.value
            xmlhttpmsg(msg)
            input.value=""
        }
    }
    function xmlhttpmsg(msg){
        var xmlhttpmsg;
        if (window.XMLHttpRequest){// code for IE7+, Firefox, Chrome, Opera, Safari
            xmlhttpmsg=new XMLHttpRequest();
        }else{// code for IE6, IE5
            xmlhttpmsg=new ActiveXObject("Microsoft.XMLHTTP");
        }
        xmlhttpmsg.open("post",msg,true);
        xmlhttpmsg.send();
        xmlhttpmsg.onreadystatechange = function(){
            if (xmlhttpmsg.readyState==4){
                chatroom.innerHTML=xmlhttpmsg.responseText; 
            }
        }
    }
    window.onbeforeunload = function() {
        leaveroom()
    }
    </script>
</body>
</html>
