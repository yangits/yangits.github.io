<!doctype html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
		<title>推箱子</title>
		<style>
		*{
			-webkit-touch-callout: none;
			-webkit-user-select: none;
			-khtml-user-select: none;
			-moz-user-select: none;
			-ms-user-select: none;
			user-select: none;
			margin:0px;
			padding:0px;
		}
		body{
			overflow:hidden;
		}
		.game{
			text-align: center;
        	margin: auto;
			max-width: 500px;
		}
		.game input{
			height: 30px;
		}
		.game canvas{
			margin-top: 10px;
			background-color: rgb(200, 200, 200);
            border: 5px  solid #280000;
			width:96%;
		}
		.bt input{
			width: 70px;
			height: 70px;
			border-radius: 50%;
			margin-left: 2px;
			margin-right: 2px;
			margin-top: 10px;
			font-size: 20px;
		}
		.cen{
			position: fixed;
			left: 0;
			right: 0;
			text-align: center;
       		margin: auto;
		}
		</style>
	</head>
	<body onkeydown="doKeyDown(event)"><!--身体-->
		<div class="game">	
			<canvas id="canvas" width="560" height="560"></canvas>
			<div id="msg"></div>
			<input type="button" value="上一关" onclick="NextLevel(-1)">
			<input type="button" value="下一关" onclick="NextLevel(1)">
			<input type="number" id="vel" min="1" max="100" onkeyup="this.value=this.value.replace(/[^0-9]/g,'');">
			<input type="button" value="GO" onclick="GO();">
			<input type="button" value="重置"  onclick="NextLevel(0)">
			<input type="button" value="说明" onclick="showHelp()">
			<input type="button" value="回退" onclick="back()">
		</div>
		<div class="cen">
			<div class="bt">
				<input type="button" value="左" onclick="go('left')">
				<input type="button" value="上" onclick="go('up')">	
				<input type="button" value="右" onclick="go('right')">
			</div>
			<div class="bt">
				<input type="button" value="下" onclick="go('down')">
			</div>
		</div>
	</body>
	<script src="./mapdata100.js"></script>
	<script>
		var can = document.getElementById("canvas");
		var msg = document.getElementById("msg");
		var cxt = can.getContext("2d");
		var curMap;//当前的地图
		var curLevel;//当前等级的地图
		var iCurlevel = 0;//关卡数
		var moveTimes = 0;//移动了多少次
		var point = [0,0];//小人的初始值
		var step=[]//移动记录
		cxt.translate(5,5);//画布基准位置
        var n=35;a=33,b=4;
        initLevel();//初始化对应等级的游戏
        showMoveInfo();//初始化对应等级的游戏数据
        function drawhui1(i,j,a,b){//墙绘制
			cxt.beginPath();
			cxt.fillStyle="rgb(100, 100, 100)";
            cxt.fillRect(j*n,i*n,a,a);
        }
        function drawhui2(i,j,a,b){//小球绘制
			cxt.beginPath();
			cxt.fillStyle = 'rgb(0, 0, 0)';
			cxt.arc(j*n+ a/2,i*n+ a/2, a/3, 0, 2 * Math.PI, false);
			cxt.fill();
        }
        function drawhui3(i,j,a,b){//箱子绘制
			cxt.beginPath();
            cxt.strokeStyle = "rgb(0, 0, 0)";
			cxt.fillStyle="rgb(204, 170, 102)";
            cxt.lineWidth=b;
            cxt.fillRect(j*n,i*n,a,a);
			cxt.moveTo(j*n+a/4, i*n+a/4); // 起点
			cxt.lineTo(j*n+3*a/4, i*n+3*a/4); // 线
			cxt.moveTo(j*n+3*a/4, i*n+a/4); // 起点
			cxt.lineTo(j*n+a/4, i*n+3*a/4); // 线
			cxt.stroke();     
        }
        function drawhui4(i,j,a,b){//人物绘制
			cxt.beginPath();
            cxt.lineWidth=b;
			cxt.strokeStyle = "rgb(0, 0, 0)";
			cxt.fillStyle = 'rgb(0, 0, 0)';
			cxt.arc(j*n+ a/2,i*n+ a/2, a/2, 0, 2 * Math.PI, true);
			cxt.stroke();  
			cxt.beginPath();
			cxt.arc(j*n+ a/2,i*n+ a/2, a/4, 0,Math.PI, false);
			cxt.stroke(); 
			cxt.beginPath(); 
			cxt.arc(j*n+ a/3,i*n+ a/3, a/8, 0, 2 * Math.PI, false);
			cxt.fill();
			cxt.arc(j*n+ 2*a/3,i*n+ a/3, a/8, 0, 2 * Math.PI, false);
			cxt.fill();
        }
		function drawhui5(i,j,a,b){//小球和箱子重合绘制
			cxt.beginPath();
            cxt.strokeStyle = "rgb(0, 0, 0)";
			cxt.fillStyle = 'rgb(204, 170, 102)';
            cxt.lineWidth=b;
            cxt.fillRect(j*n,i*n,a,a);
			cxt.arc(j*n+ a/2,i*n+ a/2, a/4, 0, 2 * Math.PI, false);
			cxt.stroke();        
        }
		//绘制每个游戏关卡地图
		function DrawMap(level){
            cxt.clearRect(0, 0, canvas.width, canvas.height);
			for (var i=0;i<level.length ;i++ )
			{
				for (var j=0;j<level[i].length ;j++ )
				{	
					switch (level[i][j]){
					case 1:   drawhui1(i,j,a,b);break;//墙
					case 2:   drawhui2(i,j,a,b);break;//小球
					case 3:   drawhui3(i,j,a,b);break;//箱子
					case 4:   drawhui4(i,j,a,b);point= [i,j];break;//小人
					case 5:   drawhui5(i,j,a,b);break;  // 小球加箱子
					}
                }
            }
        }
		function GO(){//跳转关卡
			var vel=document.getElementById('vel').value;
			if(vel=="0"||vel==""){vel=1};
			document.getElementById('vel').value=""
			iCurlevel = parseInt(vel)-1;//iCurlevel当前的地图关数
			if(iCurlevel>levels.length-1){iCurlevel=levels.length-1};
			initLevel();//初始当前等级关卡
		}
		//初始化游戏等级
		function initLevel(){
			curMap = copyArray(levels[iCurlevel]);//当前移动过的游戏地图
			curLevel = levels[iCurlevel];//当前等级的初始地图
			DrawMap(curMap);//绘制出当前等级的地图
			step=[];moveTimes = 0;//游戏关卡移动步数清零
			showMoveInfo();//初始化当前关卡数据
		}
		//下一关
		function NextLevel(i){
			//iCurlevel当前的地图关数
			iCurlevel = iCurlevel + i;
			if (iCurlevel<0)
			{
				iCurlevel = 0;
				initLevel();//初始当前等级关卡
				return;
			}
			var len = levels.length;
			if (iCurlevel > len-1)
			{
				iCurlevel = len-1;
			}
			initLevel();//初始当前等级关卡	
		}
		//小人移动
		function go(dir){
			var p1,p2;
			switch (dir)
			{
			case "up":
				//获取小人前面的两个坐标位置来进行判断小人是否能够移动
				p1 = [point[0]-1,point[1]];
				p2 = [point[0]-2,point[1]];
				break;
			case "down":
				p1 = [point[0]+1,point[1]];
				p2 = [point[0]+2,point[1]];
				break;
			case "left":
				p1 = [point[0],point[1]-1];
				p2 = [point[0],point[1]-2];
				break;
			case "right":
				p1 = [point[0],point[1]+1];
				p2 = [point[0],point[1]+2];
				break;
			}
			//若果小人能够移动的话，更新游戏数据，并重绘地图
			if (Trygo(p1,p2)){step.push(copyArray(curMap));
				moveTimes ++;showMoveInfo();DrawMap(curMap);//重绘当前更新了数据的地图
				//若果移动完成了进入下一关
				if (checkFinish()){//定时器解决渲染地图后再弹窗
					setTimeout(()=>{alert("恭喜过关！！");NextLevel(1);},0)
				}
			}
		}
		function back(){
			step.pop()
			if(step.length<=0){initLevel();return}
			curMap=copyArray(step[step.length-1])
			DrawMap(curMap);
			moveTimes --;showMoveInfo();
		}
		//判断是否推成功
		function checkFinish(){
			for (var i=0;i<curMap.length ;i++ )
			{
				for (var j=0;j<curMap[i].length ;j++ )
				{
					//当前移动过的地图和初始地图进行比较，若果初始地图上的陷进参数在移动之后不是箱子的话就指代没推成功
					if (curLevel[i][j] == 2 && curMap[i][j] != 5 || curLevel[i][j] == 5 && curMap[i][j] != 5)
					{
						return false;
					}
				}
			}
			return true;
		}
		//判断小人是否能够移动
		function Trygo(p1,p2){
			if(p1[0]<0) return false;//若果超出地图的上边，不通过
			if(p1[1]<0) return false;//若果超出地图的左边，不通过
			if(p1[0]>curMap.length) return false;//若果超出地图的下边，不通过
			if(p1[1]>curMap[0].length) return false;//若果超出地图的右边，不通过
			if(curMap[p1[0]][p1[1]]==1) return false;//若果前面是墙，不通过
			if (curMap[p1[0]][p1[1]]==3 || curMap[p1[0]][p1[1]]==5)
			{//若果小人前面是箱子那就还需要判断箱子前面有没有障碍物(箱子/墙)
				if (curMap[p2[0]][p2[1]]==0 || curMap[p2[0]][p2[1]]==2)
				{
					curMap[p2[0]][p2[1]] += 3;//更改地图对应坐标点的值
				}else {
					return false;
				}
			}
			curMap[p1[0]][p1[1]] = 4;//小人前进一步更改地图对应坐标点的值
			//若果小人前进了一步，小人原来的位置如何显示
			var v = curLevel[point[0]][point[1]];
			if (v==2||v==5)//可能是5 既有箱子又陷进
			{
				v=2;//若果小人本身就在陷进里面的话移开之后还是显示陷进
			}else{
				v=0;//小人移开之后之前小人的位置改为地板
			}
			//重置小人位置的地图参数
			curMap[point[0]][point[1]] = v;
			//若果判断小人前进了一步，更新坐标值
			point = p1;
			//若果小动了 返回true 指代能够移动小人
			return true;
		}
		//判断是否推成功
		//与键盘上的上下左右键关联
		function doKeyDown(event){
			switch (event.keyCode)
			{
			case 37://左键头
      		case 65:
				go("left");
				break;
			case 38://上键头
      		case 87:
				go("up");
				break;
			case 39://右箭头
      		case 68:
				go("right");
				break;
			case 40://下箭头
      		case 83:
				go("down");
				break;
			case 90:
			case 8:
				back();
				break;
			}

		}
		//完善关卡数据及游戏说明
		function showMoveInfo(){
			msg.innerHTML = "第" + (iCurlevel+1) +"/100关 移动次数: "+ moveTimes;showhelp =false;
		}
		//游戏说明
		var showhelp = false;
		function showHelp(){
			showhelp = !showhelp;
			if (showhelp)
			{
				msg.innerHTML = "用键盘上的上(w)、下(s)、左(a)、右(d)键移动小人,Backspace(z)可以回退，把箱子全部推到小球的位置即可过关。箱子只可向前推，不能往后拉，并且小人一次只能推动一个箱子。";
			}else{
				showMoveInfo();
			}
		}

		//克隆二维数组
		function copyArray(arr){
			var b=[];//每次移动更新地图数据都先清空再添加新的地图
			for (var i=0;i<arr.length ;i++ )
			{
				b[i] = arr[i].concat();//链接两个数组
			}
			return b;
		}

	</script>
</html>
