<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>练习html代码</title>
    <link rel="stylesheet" href="./my.css">
    <style>

    </style>
</head>

<body>  
    <!-- class类选择器 -->
    <div class="backgc">
        <!-- border=""是表格线 -->
        <table border="1">  
            <caption>学生信息表</caption>
            <tr>
                <th>年级</th>
                <th>姓名</th>
                <th>成绩</th>
            </tr>
            <tr>
                <td rowspan="2">高三</td>
                <td>张三</td>
                <td>99分</td>
            </tr>
            <tr>
                <td>李四</td>
                <td>98分</td>
            </tr>  
            <!-- id选择器  -->
            <tr id="two">
                <td>评价</td>
                <td colspan="2">成绩很优秀，加油</td>
            </tr>
        </table>
    
        <hr>
        <form>
            用户名：<input type="text" placeholder="输入用户名">
            <br>
            密&nbsp;&nbsp;&nbsp;码：<input type="password" placeholder="输入密码">
            <br>
            性&nbsp;&nbsp;&nbsp;别：
            <input type="radio" name="sex" checked id="1"><label for="1">男</label>
            <label><input type="radio" name="sex">女</label>
            <br>
            技能：
            <label><input type="checkbox">Python</label>
            <label><input type="checkbox">Java</label>
            <br>  
            所在城市：
            <select>
                <option>北京</option>
                <option>上海</option>
                <option selected>广州</option>
            </select>
            <br>
            <br>
            <input type="button" value="按钮">
            <input type="submit">
            <input type="reset">
            <br>
            <br>
            <input type="file" multiple>
            <br>
            个人介绍：
            <br>
            <textarea></textarea>
            <br>
            <ul>
                <li>年满单身</li>
                <li>严肃真诚</li>
            </ul>
            <label><input type="checkbox">我同意以上承诺</label>
            <br>
            <button type="submit">提交注册</button>
            <button type="reset">重置</button>
        </form>
        <hr>   
        <p class="text">2019年，事件视界望远镜团队让世界首次看到了<a href="#">黑洞</a>的样子。不过，研究人员公布的这张发光环形物体的图像并不是传统的图片，而是经过计算获得的。利用位于美国、墨西哥、智利、西班牙和南极地区的射电望远镜所得到的数据，研究人员进行了数学转换，最终合成了这张标志性的图片。研究团队还发布了实现这一壮举所用的编程代码，并撰文记录这一发现，其他研究者也可以在此基础上进一步加以分析。</p>
 
    </div>
</body>
</html>
