<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku</title>
  <style>
    *{
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      margin:0px;
      padding:0px;
      text-align: center;
      margin: auto;
    }
    .sudoku_wrap {
      max-width: 500px;
    }
    #timer {
      max-width: 500px;
      padding: 10px;
    }
    .check_wrap {
      max-width: 500px;
    }

    #sudoku {
      max-width: 500px;
      list-style: none;
      padding-left: 20px;
    }

    #sudoku li {
      width: 10%;
      height: 35px;
      border: 1px solid #000;
      float: left;
      text-align: center;
      line-height: 35px;
      font-size: 20px;
      /* background: linear-gradient(to bottom, #73FF96 0%, #fff 20%, #fff 80%, #73FF96 100%);
      background: linear-gradient(to right, #73FF96 0%, #fff 20%, #fff 80%, #73FF96 100%); */
    }

    input {
      width:30%;
      height: 30px;
      font-size: 20px;
      border-radius: 5px;
    }
    span{
      padding-left: 10px;
    }
    button{
      width: 12%;
      height: 30px;
      margin-top: 10px;
    }
    .footbt{
      max-width: 500px;
    }
  </style>
</head>
<body>
  <div id="difficulty" class="check_wrap">
    <input type="button" value="简单" onclick="easy();gameStart()" checked>
    <input type="button" value="困难" onclick="hard();gameStart()">
    <input type="button" value="大师" onclick="disgust();gameStart()">
  </div>
  <div id="timer"></div>
  <div class="sudoku_wrap">
    <ul id="sudoku"></ul>
    <script>
      var sudoku = document.getElementById('sudoku');
      for (var i = 0; i < 9; i++) {
        for (var j = 0; j < 9; j++) {
          sudoku.innerHTML+='<li onclick="select('+i+','+j+')"></li>'
      }}
  </script>
  </div>
  <div class="footbt">
    <button onclick="claer_num()">清除</button>
    <button >检查</button>
    <button >标记</button>
    <button onclick="del_num()">删除</button>
    <button onclick="showAnswer()">答案</button>
    <button onclick="inputnum(1)">1</button>
    <button onclick="inputnum(2)">2</button>
  </div>
  <div class="footbt">
    <button onclick="inputnum(3)">3</button>
    <button onclick="inputnum(4)">4</button>
    <button onclick="inputnum(5)">5</button>
    <button onclick="inputnum(6)">6</button>
    <button onclick="inputnum(7)">7</button>
    <button onclick="inputnum(8)">8</button>
    <button onclick="inputnum(9)">9</button>
  </div>
  <script src="sudoku.js"></script>
</body>
</html>
