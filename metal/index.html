<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金属计算器</title>
</head>
<style>
    .home {
        font-size: 16px;
        background-color: rgb(220, 220, 220);
        width: 300px;
        text-align: center;
        margin: auto;
        line-height: 40px;
    }
    input {
        width: 160px;
        height: 25px;
        text-align: right;
        border: 0px;

    }
    #select, #material {
        font-size: 18px;
        border: 0px;
        background-color: rgb(220, 220, 220);
        text-align: center;
    }
    #material{
        font-size: 14px;
        
    }
    .foot,#PP{
        text-align: center;
        color: rgb(160, 160, 160);
        font-size: 8px;
    }
    a{
        text-align: center;
        font-size: 8px;
        line-height: 8px;
    }
    #text_result{
        color: red;
    }

</style>
<body>
    <div class="home">
        品类：
        <select id="select" onchange="select_click();">
            <option selected>钢板</option>
            <option>圆钢</option>
            <option>圆管</option>

        </select>
        
        <div>计算结果:<span id="text_result">0.000</span>kg</div>
        <div id="TT">*厚度: <input id="T" type="text" value="" placeholder="0" onkeyup="repl(this);">mm</div>
        <div id="WW">*宽度: <input id="W" type="text" value="" placeholder="0" onkeyup="repl(this);">mm</div>
        <div id="DD" style="display: none;">*外径: <input id="D" type="text" placeholder="0" onkeyup="repl(this);">mm</div>
        <div id="LL">*长度: <input id="L" type="text" value="" placeholder="0" onkeyup="repl(this);">m&nbsp;&nbsp;&nbsp;</div>
        <span id="PP">密度:<span id="P">7.85</span>g/mm³。材质为：</span>
        <select id="material" onchange="P_change();">
            <option selected>碳钢</option>
            <option>不锈钢</option>
            <option>铝合金</option>
        </select>
        <br><a href="https://xingyuantv.github.io/cal">排管程序</a>
    </div> 
    <div class="foot">本工具计算结果是理论估算值, <br>与实际测量值存在偏差, 仅供参考</div>
    <script>
        function text_input(){   
            let P=document.getElementById('P').innerHTML
            let T = parseFloat(document.getElementById('T').value);
            let W = parseFloat(document.getElementById('W').value);
            let D = parseFloat(document.getElementById('D').value);
            let L = parseFloat(document.getElementById('L').value);
            let text = document.getElementById('text_result');
            let select = document.getElementById('select');
            if (select.value=="钢板") {
                if(isNaN(T)==false && isNaN(W)==false && isNaN(L)==false){
                    text.innerHTML =Math.round(T*W*L*P)/1000;
                }
            }
            if (select.value=="圆钢") {
                if(isNaN(D)==false && isNaN(L)==false){
                    text.innerHTML =Math.round(D*D*L*3.1415926/4*P)/1000;
                }
            }
            if (select.value=="圆管") {
                if(isNaN(T)==false && isNaN(D)==false && isNaN(L)==false){
                    text.innerHTML =Math.round(T*(D-T)*L*3.1415926*P)/1000;
                }
            }
        }
        function repl(obj){
            obj.value=obj.value.replace(/[^0-9\.]/g,'');
            text_input();
        }
        function P_change(){
            let P=document.getElementById('P');
            let material = document.getElementById('material');
            if (material.value=="碳钢"){
                P.innerHTML=7.85
            }
            if (material.value=="不锈钢"){
                P.innerHTML=7.93
            }
            if (material.value=="铝合金"){
                P.innerHTML=2.73
            }
            text_input();
        }
        function select_click(){
            let select = document.getElementById('select');
            document.getElementById('T').value="";
            document.getElementById('W').value="";
            document.getElementById('D').value="";
            document.getElementById('L').value="";
            document.getElementById('text_result').innerHTML="0.000";
            document.getElementById("TT").style.display="";
            document.getElementById("WW").style.display="";
            document.getElementById("LL").style.display="";
            document.getElementById("DD").style.display="";
            if (select.value=="钢板") {
                document.getElementById("DD").style.display="none";
            }
            if (select.value=="圆钢") {
                document.getElementById("TT").style.display="none";
                document.getElementById("WW").style.display="none";
            }
            if (select.value=="圆管") {
                document.getElementById("WW").style.display="none";
            }
        }
    </script>
</body>
</html>
