<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻方</title>
</head>
<body>
    <input id="nn" type="text" value="9">
    <button type="button" id="get_result">开始计算</button>
    <textarea id="text_result"></textarea>
    <script>
        document.getElementById('get_result').onclick = function () {
            let n = parseInt(document.getElementById('nn').value)
            let text = document.getElementById('text_result');
            text.value=JSON.stringify(magicMatrix(n))
        }
        function magicMatrix(n) {
            var matrix = [];
            var x = 0;
            var y = (n-1)/2; // 奇数的中心位置
            for (let i = 0; i < n; i++) {
                matrix[i] = [];
                for (let j = 0; j < n; j++) {
                    matrix[i][j] = 0;
                }
            }
            // 按升序依次填写
            for (let i = 0; i < n * n; i++) {
                // 填写当前位置的值
                matrix[x][y] = i + 1;
                // 存住当前位置
                var tx = x;
                var ty = y;
                // 默认更新为右上角位置
                x--;
                if (x < 0) {
                    x += n;
                }
                y++;
                if (y >= n) {
                    y -= n;
                }
                // 右上角已有数据, 则回退到正下方位置
                if (matrix[x][y] !== 0) {
                    x = tx + 1;
                    if (x === n) {
                        x -= n;
                    }
                    y = ty;
                }
            }
            return matrix;
        }
    </script>
</body>
</html>
