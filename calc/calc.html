<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,minimum-scale=1,maximum-scale=1,user-scalable=no">
    <title>口算练习机</title>
</head>
 <style>
    *{
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        margin:0px;
        padding:0px;
    }
    body {
        max-width: 400px;
        background: #019CD6;
        user-select: none;
        overflow: hidden;
        text-align: center;
        margin: auto;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    .top{

        position: fixed; /* 设置为fixed使其保持在页面上 */
        z-index: 1;
        width: 100%; /* 宽度 */
        height: 100%; /* 高度 */
        margin: auto;
        top: 0;left: 0;
        padding: 0px;
    }
    textarea{
        color: #000;
        height: 75%;
        line-height: 38px;
        text-align: left;
        width: 100%;
        background: #019CD6;
        font-size: 38px;
    }
    .game{
        width:85%;
        margin: 10px auto;
        border-radius: 15px;
        border: 10px inset;
        border-color: #23a4d3 #4dbde3 #59c6e8 #019CD6;
        overflow: hidden;
        background-color: #9facaa;
    }
    .game canvas{
        border-radius: 5px;
        background-color: #9facaa;
        width:100%;
    }
    .bt1 button{
        margin: 15px 10px;
        outline: none;
        cursor: pointer;
        width: 16%;
        height: 50px;
        border-radius: 5px;
        font-size: 20px;
        background: linear-gradient(145deg, #eb6c17, #c16802);
    }
    .bt2 button{
        margin: 15px 10px;
        outline: none;
        cursor: pointer;
        width: 16%;
        height: 60px;
        border-radius: 50%;
    }   
     .bt3{
        margin: 15px 10px;
        outline: none;
        cursor: pointer;
        width: 20%;
        height: 50px;
        border-radius: 5px;
        background: linear-gradient(145deg, #eb6c17, #c16802);
    }
    .ok{
        margin: 10px 20px;
        outline: none;
        cursor: pointer;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(145deg, #eb6c17, #c16802);
    }
    button{
        user-select: none;
        text-align: center;
        font-size: 30px;
        border: 0px;
        background: linear-gradient(145deg, #decb02, #c1b002);
        box-shadow:  4px 4px 8px #555555,-4px -4px 8px #7ed2d2;
    }
    button:active {
        background: linear-gradient(145deg, #a69700, #c5b400);
        box-shadow:  2px 2px 4px #555555,-2px -2px 4px #7ed2d2;
    }
 </style>
<body>
    <div class="top" id="topmain" style="display: none;">
        <button style="width: 100%;background: rgba(255, 255, 255, 0);height:25%;" onclick="back()"></button>
        <canvas id="board" style="width: 100%;background: #019CD6; height: 75%;display: none;"></canvas>
        <textarea id="historys" disabled style="display: none;"></textarea>
    </div>
    <div id="main">
        <div class="game"><canvas id="game" width="320" height="120"></canvas></div>
        <div class="bt1">
            <button type="button" onclick="numtitle++;num_title()">范围</button>
            <button type="button" onclick="settitle++;numtitle=0;set_title()">功能</button>
            <button type="button" onclick="topboard()">画板</button>
            <button type="button" onclick="topbt()">记录</button>
        </div>
        <div class="bt2"> 
            <button type="button" onclick="numbt('1')">1</button>
            <button type="button" onclick="numbt('2')">2</button>
            <button type="button" onclick="numbt('3')">3</button>
            <button type="button" onclick="draw_bors('>')">></button>
        </div>
        <div class="bt2"> 
            <button type="button" onclick="numbt('4')">4</button>
            <button type="button" onclick="numbt('5')">5</button>
            <button type="button" onclick="numbt('6')">6</button>
            <button type="button" onclick="draw_bors('<')"><</button>
        </div>
        <div class="bt2"> 
            <button type="button" onclick="numbt('7')">7</button>
            <button type="button" onclick="numbt('8')">8</button>
            <button type="button" onclick="numbt('9')">9</button>
            <button type="button" onclick="numbt('0')">0</button>
        </div>
        <div >
            <button type="button" class="bt3" onclick="draw_bors('=')">=</button>
            <button type="button" class="ok" onclick="ok()">OK</button>
            <button type="button" class="bt3" onclick="answer=answer.slice(0, -1);draw_answer();">×</button>
        </div>
    </div>
 <script>
    var main = document.getElementById("main");
    main.addEventListener('touchmove', function(e) {event.preventDefault();},{ passive: false });
    var board  = document.getElementById('board');
    var canva_board = board.getContext('2d');
    var topmain = document.getElementById("topmain");
    var recordbt = document.getElementById("record");
    var game = document.getElementById("game");
    var historys = document.getElementById("historys");
    var ctx=game.getContext("2d");
    ctx.lineWidth=3;//线宽
    var numtitle=0,settitle=0; 
    var numtitles=[["0—10数字","0—20数字","20—50数字","20—100数字"],
            ["凑十法练习","破十法练习","加法进位练习","减法借位练习","九九乘法表"],
            ["九九乘法表","AB×C","A×BCD","AB×CD"],
            ["AA〇BB","A+/-B〇C","1A+/-1B〇1C","AA+/-BB〇CC"],
            ["A/B〇C/B","A/B〇C/D","AA/BB〇CC/BB","AA/BB〇CC/DD"]];
    var settitles=["加减运算练习","专项练习","乘法运算练习","算式比大小","分数比大小"];
    num_title();set_title();
    var text, a="", b="", c="", d="", fh="", fha="";
    var answer="";
    start();
    function num_title(){//标题范围绘制
        if(numtitle>=numtitles[settitle].length){numtitle=0}
        ctx.font = "15px Arial";
        ctx.clearRect(0, 0, 160, 20);
        ctx.fillText(numtitles[settitle][numtitle], 10, 15);
        start();
    }
    function set_title(){//标题功能绘制
        if(settitle>=settitles.length){settitle=0}
        num_title();
        ctx.font = "15px Arial";
        ctx.clearRect(160, 0, 320, 20);
        ctx.fillText(settitles[settitle], 160, 15);
        start();
    }
    function draw_calc(a,fh,b,fha,c){//算式绘制
        ctx.font = "40px Arial";
        ctx.clearRect(0, 20, 320, 120);
        ctx.fillText(a, 10, 60);ctx.fillText(fh, 60, 60);ctx.fillText(b, 100, 60);
        ctx.fillText(fha, 150, 60);ctx.fillText(c, 190, 60);
        ctx.fillText("=", 10, 110);
    } 
    function draw_score(){//分数绘制
        ctx.font = "40px Arial";
        if (a<10){bl=15}else{bl=0}
        ctx.clearRect(0, 20, 320, 120);
        ctx.fillText(a, 15+bl, 60);
        ctx.fillText(b, 15+bl, 110);
        ctx.fillText(c, 135+bl, 60);
        ctx.fillText(d, 135+bl, 110);
        ctx.beginPath();ctx.moveTo(10,70); ctx.lineTo(190,70); ctx.stroke(); 
    }
    function draw_answer(){//答案绘制
        if (settitles[settitle]=="分数比大小"){return}
        ctx.clearRect(250, 20, 320, 120);
        ctx.clearRect(60, 70, 320, 120);
        ctx.fillText(answer, 60, 110);
    }
    function draw_torf(torf){//对错绘制
        ctx.clearRect(250, 20, 320, 120);
        ctx.fillText(torf, 270, 110);
        if (torf=="✓"){smile(265,28,40);}else{sad(265,28,40);}
    }
    function numbt(num){//输入、删除数字
        if (settitle>=3){return}//输入数字的禁止输入符号
        if (answer.length<4){answer=answer+num};
        draw_answer();
    }
    function draw_bors(bors){//输入大、小于号
        if (settitle<3){return};//比较大小禁止输入数字
        if (settitle==3){answer=bors;draw_answer();return};//数字比较大小
        ctx.font = "50px Arial";
        ctx.clearRect(70, 20,60, 120);
        ctx.clearRect(260, 20, 320, 120);
        ctx.fillText("〇", 75,88);
        ctx.font = "40px Arial";answer=bors;
        ctx.fillText(bors, 88,85);
    }
    function smile(j,i,a){//笑脸绘制
        ctx.beginPath();
        ctx.strokeStyle = "rgb(0, 0, 0)";
        ctx.fillStyle = 'rgb(0, 0, 0)';
        ctx.arc(j+ a/2,i+ a/2, a/2, 0, 2 * Math.PI, true);
        ctx.stroke();  
        ctx.beginPath();
        ctx.arc(j+ a/2,i+ a/2, a/4, 0,Math.PI, false);
        ctx.stroke(); 
        ctx.beginPath(); 
        ctx.arc(j+ a/3,i+ a/3, a/8, 0, 2 * Math.PI, false);
        ctx.fill();
        ctx.arc(j+ 2*a/3,i+ a/3, a/8, 0, 2 * Math.PI, false);
        ctx.fill();
    }
    function sad(j,i,a){//苦脸绘制
        ctx.beginPath();
        ctx.strokeStyle = "rgb(0, 0, 0)";
        ctx.fillStyle = 'rgb(0, 0, 0)';
        ctx.arc(j+ a/2,i+ a/2, a/2, 0, 2 * Math.PI, true);
        ctx.stroke();  
        ctx.beginPath();
        ctx.arc(j+ a/2,i+ a*4/5, a/4, Math.PI,0, false);
        ctx.stroke(); 
        ctx.beginPath(); 
        ctx.arc(j+ a/3,i+ a/3, a/8, 0, 2 * Math.PI, false);
        ctx.fill();
        ctx.arc(j+ 2*a/3,i+ a/3, a/8, 0, 2 * Math.PI, false);
        ctx.fill();
    }
    function rand(min,max){
        return Math.floor(Math.random()*(max-min)+min);
    }
    function start(){//初始化
        answer="";let min,max;
        switch (settitle){
        case 0://加减
            switch (numtitle){
            case 0:min=1;max=10;break;
            case 1:min=1;max=20;break;
            case 2:min=20;max=50;break;
            case 3:min=20;max=100;break;
            };   
            if (Math.random()<0.5){
                fh="+";a=rand(min,max);b=rand(0,max-a);
            }else{
                fh="-";a=rand(min,max);b=rand(0,a);
            }
            draw_calc(a,fh,b,"","");draw_answer();text=a+fh+b;
            break; 
        case 1:  //专项
            switch (numtitle){
            case 0:
                fh="-";a=10;b=rand(1,10);
                draw_calc(b,"+","〇","=",a);draw_answer();text=b+"+〇="+a;
                break;  
            case 1:
                fh="-";a=10;b=rand(1,10);
                draw_calc(a,fh,b,"","");draw_answer();text=a+fh+b;
                break;
            case 2:     
                fh="+";a=rand(2,10);b=rand(11-a,9);
                draw_calc(a,fh,b,"","");draw_answer();text=a+fh+b;
                break;
            case 3:
                fh="-";a=rand(11,19);b=rand(a-9,9);
                draw_calc(a,fh,b,"","");draw_answer();text=a+fh+b;
                break;
            case 4:
                fh="×";a=rand(1,10);b=rand(1,10);
                draw_calc(a,fh,b,"","");draw_answer();text=a+fh+b;
                break;
            };
            break;
        case 2:  //乘法
            fh="×";
            switch (numtitle){
            case 0:
                a=rand(1,10);b=rand(1,10);
                break;
            case 1:
                a=rand(10,100);b=rand(1,10);
                break;
            case 2:
                a=rand(1,10);b=rand(100,1000);
            break;
            case 3:
                a=rand(10,100);b=rand(10,100);
                break;
            };  
            draw_calc(a,fh,b,"","");draw_answer();text=a+fh+b;
            break;
        case 3: //算式比大小
            fha="〇";
            switch (numtitle){
            case 0:
                a=rand(1,100); b=rand(1,100);
                draw_calc(a,fha,b,"","");draw_answer();text=a+fha+b;
                break;
            case 1:
                if (Math.random()<0.5){
                    fh="+";
                    a=rand(1,10);b=rand(1,10-a);
                }else{
                    fh="-";
                    a=rand(1,10);b=rand(1,a);
                }
                c=rand(1,10);
                draw_calc(a,fh,b,fha,c);text=a+fh+b+fha+c;
                draw_answer();
                break;
            case 2:
                if (Math.random()<0.5){
                    fh="+";a=rand(1,20);b=rand(1,20-a);
                    
                }else{
                    fh="-";a=rand(1,20);b=rand(1,a);
                }
                c=rand(1,20);
                draw_calc(a,fh,b,fha,c);draw_answer();text=a+fh+b+fha+c;
                break;
            case 3:
                if (Math.random()<0.5){
                    a=rand(20,100); b=rand(20,100-a);
                }else{
                    a=rand(20,100);b=rand(20,a);
                }
                c=rand(20,100);
                draw_calc(a,fh,b,fha,c);draw_answer();text=a+fh+b+fha+c;
                break;
            };
            break;
        case 4://分数比大小
            fh="/";
            switch (numtitle){
            case 0:
            a=rand(1,10); b=rand(2,10); c=rand(1,10); d=b;
            draw_score();draw_bors("");
            break;
            case 1:
            a=rand(1,10); b=rand(2,10);c=rand(1,10);d=rand(2,10);
            while(b==d){d=rand(2,10);}
            draw_score();draw_bors("");
            break;
            case 2:
            a=rand(10,100);b=rand(11,100);c=rand(10,100);d=b;
            draw_score();draw_bors("");
            break;
            case 3:
            a=rand(10,100);b=rand(11,100);c=rand(10,100);d=rand(11,100);
            while(b==d){d=rand(11,100);}
            draw_score();draw_bors("");
            break;
            }
        }
    }

    function ok(){//判断对错
        if (answer=="") {return};
        if (fh=="/"){
            if (a/b>c/d && answer==">" || a/b<c/d && answer=="<"|| a/b==c/d && answer=="="){
                draw_torf("✓");
                historys.innerHTML+=a+"/"+b+"〇"+c+"/"+d+";"+answer+" ✓\n"
                setTimeout(()=>{start();},600);
            }else{
                draw_torf("×");
                historys.innerHTML+=a+"/"+b+"〇"+c+"/"+d+";"+answer+" ×\n"
                answer="";
                setTimeout(()=>{draw_bors("");},600);
            }return;
        }
        var ans;
        if (fh=="+"){ans=a+b};
        if (fh=="-"){ans=a-b};
        if (fh=="×"){ans=a*b};
        if (fha=="〇"){
            if (ans>c && answer==">" || ans<c && answer=="<"|| ans==c && answer=="="){
                draw_torf("✓");
                historys.innerHTML+=text+";"+answer+" ✓\n"
                setTimeout(()=>{start();},600);
            }else{
                draw_torf("×");
                historys.innerHTML+=text+";"+answer+" ×\n"
                answer="";
                setTimeout(()=>{draw_bors("");},600);
            }fha=="";return;
        };
        if(numtitle==0 && settitle==1){fhtext=";"}else{fhtext="="}
        if (answer==ans){
            draw_torf("✓");
            historys.innerHTML+=text+fhtext+answer+" ✓\n"
            setTimeout(()=>{start();},600);
        }else{
            draw_torf("×");
            historys.innerHTML+=text+fhtext+answer+" ×\n"
            answer="";
            setTimeout(()=>{draw_answer()},600);
        }
    }
    function topbt(){//记录
        topmain.style.display="";
        historys.style.display="";
        board.style.display="none";
    }
    function topboard(){//画板
        topmain.style.display="";
        historys.style.display="none";
        board.style.display="";
        board.width=window.innerWidth;
        board.height=window.innerHeight*0.8;
        canva_board.lineWidth=2;//线宽
        var startX;
        var startY;
        board.addEventListener('touchstart', function(e) {
            event.preventDefault(); // 防止默认行为，如滚动
            var touch = event.touches[0]; // 获取第一个触点
            startX = touch.pageX - board.offsetLeft;
            startY = touch.pageY - board.offsetTop;
            canva_board.beginPath(); // 开始绘制新路径
            canva_board.moveTo(startX, startY); // 移动到起点
        });
        board.addEventListener('touchmove', function(e) {
            event.preventDefault();
            var touch = event.touches[0];
            var moveX = touch.pageX - board.offsetLeft;
            var moveY = touch.pageY - board.offsetTop;
            canva_board.lineTo(moveX, moveY); // 绘制直线到移动点
            canva_board.stroke(); // 绘制路径
        });
    }
    function back(){
        topmain.style.display="none";
        historys.style.display="none";
        board.style.display="none";
        canva_board.clearRect(0, 0, board.width, board.height);
    }
 </script>
</body>
</html>
