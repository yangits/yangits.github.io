<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,minimum-scale=1,maximum-scale=1,user-scalable=no">
    <title>口算练习机</title>
</head>
 <style>
    *{
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        margin:0px;
        padding:0px;
    }
    body {
        max-width: 400px;
        background: #019CD6;
        user-select: none;
        overflow: hidden;
        text-align: center;
        margin: auto;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    .top{

        position: fixed; /* 设置为fixed使其保持在页面上 */
        z-index: 1;
        width: 100%; /* 宽度 */
        height: 100%; /* 高度 */
        margin: auto;
        top: 0;left: 0;
        padding: 0px;
    }
    textarea{
        height: 80%;
        line-height: 50px;
        text-align: left;
        width: 100%;
        background: #019CD6;
        font-size: 50px;
        overflow-y:scroll;
    }
    .game{
        width:85%;
        margin: 10px auto;
        border-radius: 15px;
        border: 10px inset;
        border-color: #23a4d3 #4dbde3 #59c6e8 #019CD6;
        overflow: hidden;
        background-color: #9facaa;
    }
    .game canvas{
        border-radius: 5px;
        background-color: #9facaa;
        width:100%;
    }
    .bt1 button{
        margin: 15px 10px;
        outline: none;
        cursor: pointer;
        width: 16%;
        height: 50px;
        border-radius: 5px;
        font-size: 20px;
        background: linear-gradient(145deg, #eb6c17, #c16802);
    }
    .bt2 button{
        margin: 15px 10px;
        outline: none;
        cursor: pointer;
        width: 16%;
        height: 60px;
        border-radius: 50%;
    }   
     .bt3{
        margin: 15px 10px;
        outline: none;
        cursor: pointer;
        width: 20%;
        height: 50px;
        border-radius: 5px;
        background: linear-gradient(145deg, #eb6c17, #c16802);
    }
    .ok{
        margin: 10px 20px;
        outline: none;
        cursor: pointer;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(145deg, #eb6c17, #c16802);
    }
    button{
        user-select: none;
        text-align: center;
        font-size: 30px;
        border: 0px;
        background: linear-gradient(145deg, #decb02, #c1b002);
        box-shadow:  4px 4px 8px #555555,-4px -4px 8px #7ed2d2;
    }
    button:active {
        background: linear-gradient(145deg, #a69700, #c5b400);
        box-shadow:  2px 2px 4px #555555,-2px -2px 4px #7ed2d2;
    }
 </style>
<body>
    <div class="top" id="topmain" style="display: none;">
        <button style="width: 100%;background: rgba(255, 255, 255, 0);height:20%;" onclick="back()"></button>
        <canvas id="board" style="width: 100%;background: #019CD6; height: 80%;display: none;"></canvas>
        <textarea id="historys" disabled style="display: none;"></textarea>

    </div>
    <div class="game"><canvas id="game" width="320" height="80"></canvas></div>
    <div class="bt1">
        <button type="button" onclick="num_title()">范围</button>
        <button type="button" onclick="set_title()">功能</button>
        <button type="button" onclick="topboard()">画板</button>
        <button type="button" onclick="topbt()">记录</button>
    </div>
    <div class="bt2"> 
        <button type="button" onclick="numbt('1')">1</button>
        <button type="button" onclick="numbt('2')">2</button>
        <button type="button" onclick="numbt('3')">3</button>
        <button type="button" onclick="">></button>
    </div>
    <div class="bt2"> 
        <button type="button" onclick="numbt('4')">4</button>
        <button type="button" onclick="numbt('5')">5</button>
        <button type="button" onclick="numbt('6')">6</button>
        <button type="button" onclick=""><</button>
    </div>
    <div class="bt2"> 
        <button type="button" onclick="numbt('7')">7</button>
        <button type="button" onclick="numbt('8')">8</button>
        <button type="button" onclick="numbt('9')">9</button>
        <button type="button" onclick="numbt('0')">0</button>
    </div>
    <div >
        <button type="button" class="bt3" onclick="start()">=</button>
        <button type="button" class="ok" onclick="ok()">OK</button>
        <button type="button" class="bt3" onclick="answer=answer.slice(0, -1);draw_answer();">×</button>
    </div>
 <script>
    document.addEventListener('touchmove', function(e) {e.preventDefault();},{ passive: false });
    var board  = document.getElementById('board');
    var canva_board = board.getContext('2d');
    var topmain = document.getElementById("topmain");
    var recordbt = document.getElementById("record");
    var game = document.getElementById("game");
    var historys = document.getElementById("historys");
    var ctx=game.getContext("2d");
    ctx.font = "15px Arial";
    var numtitles=["0—10数字","0—20数字","20—50数字","20—100数字"];
    var numtitle=0;
    var settitles=["加减运算练习","加法进位练习","减法借位练习","九九乘法表"];
    var settitle=0; 
    ctx.fillText(numtitles[numtitle], 10, 15);
    ctx.fillText(settitles[settitle], 120, 15);
    var text,a ,b ,c,fh;
    var answer="";
    start();
    function num_title(){
        if(settitle==0){numtitle++;}else{return}
        if(numtitle>=numtitles.length){numtitle=0}
        ctx.font = "15px Arial";
        ctx.clearRect(0, 0, 110, 20);
        ctx.fillText(numtitles[numtitle], 10, 15);
        start();
    }
    function set_title(){
        settitle++;
        if(settitle>=settitles.length){settitle=0}
        if(settitle>0){
            ctx.clearRect(0, 0, 300, 20);
        }else{num_title();}
        ctx.font = "15px Arial";
        ctx.clearRect(120, 0, 300, 20);
        ctx.fillText(settitles[settitle], 120, 15);
        start();
    }
    function draw_text(){
        ctx.font = "50px Arial";
        ctx.clearRect(0, 20, 300, 80);
        ctx.fillText(text, 10, 70);
    }
    function draw_answer(){
        ctx.clearRect(200, 20, 300, 80);
        ctx.fillText(answer, 200, 70);
    }
    function draw_torf(torf){
        ctx.clearRect(280, 20, 300, 80);
        ctx.fillText(torf, 280, 70);
    }
    function start(){
        let minnum,maxnum;
        switch (numtitle){
			case 0:minnum=1;maxnum=10;break;
			case 1:minnum=1;maxnum=20;break;
			case 2:minnum=20;maxnum=50;break;
			case 3:minnum=20;maxnum=100;break;
                };
        switch (settitle){
            case 0:   
                if (Math.random()<0.5){
                    fh="+";
                    a=Math.floor(Math.random()*(maxnum-minnum)+minnum);
                    b=Math.floor(Math.random()*(maxnum-a));
                }else{
                    fh="-";
                    a=Math.floor(Math.random()*(maxnum-minnum)+minnum);
                    b=Math.floor(Math.random()*(a-minnum)+minnum);
                }
                text=a+fh+b+"=";
                break;
            case 1:  
                fh="+";
                a=Math.floor(Math.random()*8+2);
                b=Math.floor(Math.random()*(9-11+a)+11-a);
                text=a+fh+b+"=";
                break;
            case 2:  
                fh="-";
                a=Math.floor(Math.random()*7+11);
                b=Math.floor(Math.random()*(9-a+9)+a-9);
                text=a+fh+b+"=";
                break;
            case 3:
                fh="×";
                a=Math.floor(Math.random()*9+1);
                b=Math.floor(Math.random()*9+1);
                text=a+fh+b+"=";
                break;
            } 
        draw_text();answer="";draw_answer();
    }
    function numbt(num){
        if (answer.length<2){answer=answer+num};
        draw_answer();
    }
    function ok(){
        if (answer=="") {return};
        if (fh=="+"){ans=a+b};
        if (fh=="-"){ans=a-b};
        if (fh=="×"){ans=a*b};
        if (answer==ans){
            draw_torf("✓");
            historys.innerHTML+=text+answer+" ✓\n"
            setTimeout(()=>{start();},600);
        }else{
            draw_torf("×");
            historys.innerHTML+=text+answer+" ×\n"
            answer="";
            setTimeout(()=>{draw_answer()},600);
        }
    }
    function topbt(){
        topmain.style.display="";
        historys.style.display="";
        board.style.display="none";
    }
    function topboard(){
        topmain.style.display="";
        historys.style.display="none";
        board.style.display="";
        board.width=window.innerWidth;
        board.height=window.innerHeight*0.8;
        var startX;
        var startY;
        board.addEventListener('touchstart', function(e) {
            event.preventDefault(); // 防止默认行为，如滚动
            var touch = event.touches[0]; // 获取第一个触点
            startX = touch.pageX - board.offsetLeft;
            startY = touch.pageY - board.offsetTop;
            canva_board.beginPath(); // 开始绘制新路径
            canva_board.moveTo(startX, startY); // 移动到起点
        });
        board.addEventListener('touchmove', function(e) {
            event.preventDefault();
            var touch = event.touches[0];
            var moveX = touch.pageX - board.offsetLeft;
            var moveY = touch.pageY - board.offsetTop;
            canva_board.lineTo(moveX, moveY); // 绘制直线到移动点
            canva_board.stroke(); // 绘制路径
        });
    }
    function back(){
        topmain.style.display="none";
        historys.style.display="none";
        board.style.display="none";
        canva_board.clearRect(0, 0, board.width, board.height);
    }
 </script>
</body>
</html>
