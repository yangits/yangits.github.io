        function getResult(c,d){for(var a=[],b=0;b<d.length;b++)a.push({min:d[b]});d=[];for(b=0;b<c.length;b++){for(var e={},h=0;h<c[0].length;h++)e[h]=c[b][h];e[c[0].length]=1;d.push(e)}model={optimize:c[0].length,opType:"min",constraints:a,variables:d};results=solver.Solve(model);c=[];for(var f in results)isNaN(parseInt(f))||c.push([parseInt(f),results[f]]);return c}
        function bag_program(c,d,a){for(var b=[],e=0;e<a;e++)b.push([]);for(e=0;e<c.length;e++){var h=c[e],f=[];for(i=0;i<c.length;i++)f.push(0);for(i=h;i<a+1;i+=h)f[e]++,f[e]<=d[e]&&b[i-1].push(deepcopy(f));for(i=0;i<a;i++)if(b[i]&&i+h<a)for(var g in b[i])f=deepcopy(b[i][g]),f[e]++,f[e]<=d[e]&&b[i+h].push(deepcopy(f))}return num_arrs=dellarrys(b.flat())}function deepcopy(c){for(var d=[],a=0;a<c.length;a++)d[a]=c[a];return d}
        function sumf(c,d){for(var a=[],b=0;b<c.length;b++)if(0<d[b])for(var e=0;e<d[b];e++)a.push(c[b]);return a}function sumarrys(c,d){var a=0;for(i=0;i<c.length;i++)a+=c[i]*d[i];return a}function sumar(c,d){var a=[];for(i=0;i<c.length;i++)a.push(c[i]*d);return a}function sum(c,d){var a=[];for(i=0;i<c.length;i++)a.push(c[i]+d[i]);return a}function dellarrys(c){var d={};c.forEach(function(a){return d[a]=a});return re=Object.values(d)}
        document.getElementById("get_result").onclick=function(){var c=parseInt(document.getElementById("max_weight").value),d=document.getElementById("weights").value.split(",").map(Number),a=document.getElementById("nums").value.split(",").map(Number),b=document.getElementById("text_result");b.value="\u5f00\u59cb\u8ba1\u7b97\u2026\u2026\n\u5f00\u59cb\u52a8\u6001\u89c4\u5212\uff0c\u8ba1\u7b97\u6240\u6709\u4e0b\u6599\u5206\u5e03\u53ef\u80fd\u2026\u2026";var e=bag_program(d,a,c);b.value+="\n\u52a8\u6001\u89c4\u5212\u7ed3\u675f\uff0c\u5f00\u59cb\u7ebf\u6027\u89c4\u5212\u9009\u62e9\u6700\u4f18\u5206\u5e03\u2026\u2026";
        if(a=getResult(e,a)){for(var h=[],f=0,g=l=0;g<a.length;g++)re=.3>Math.abs(Math.round(a[g][1])-a[g][1])?Math.round(a[g][1]):Math.ceil(a[g][1]),b.value+="\n"+(g+1)+"#\uff1a\u4f59"+(c-sumarrys(d,e[a[g][0]])),b.value+="\uff0c\u9700"+re+"\u6839"+JSON.stringify(sumf(d,e[a[g][0]])),f+=re,l+=sumarrys(d,e[a[g][0]])*re,h=1>g?sumar(e[a[g][0]],re):sum(h,sumar(e[a[g][0]],re));b.value+="\n\u4e0b\u6599\u6570\u91cf\u5206\u522b\u4e3a\uff1a"+JSON.stringify(h);b.value+="\n\u6240\u9700\u539f\u6599\u603b\u6570\u76ee\u4e3a\uff1a"+
        f;b.value+="\n\u7ba1\u6750\u5e73\u5747\u5229\u7528\u7387\u4e3a\uff1a"+Math.round(l/f/c*1E4)/100+"%";b.value+="\n\u6b64\u7a0b\u5e8f\u4ec5\u4f9b\u5b66\u4e60\u548c\u53c2\u8003\uff0c\u8ba1\u7b97\u7ed3\u679c\u81ea\u884c\u627f\u62c5\u98ce\u9669\uff01"}else b.value+="\n\u8ba1\u7b97\u505c\u6b62\uff0c\u51fa\u73b0\u672a\u77e5\u9519\u8bef\uff0c\u8bf7\u8c03\u6574\u539f\u6750\u6599\u957f\u3002"};      
    </script>
