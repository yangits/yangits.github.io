<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta http-equiv="X-UA-Compatible" content="IE=edge"><meta name="viewport" content="width=device-width,initial-scale=1"><title>管材排料计算</title></head><style>form{color:#000;font-size:16px;background-color:#cecbcb;width:380px;text-align:center;margin:auto}input{width:250px;height:25px}button{width:300px;height:25px}textarea{width:330px;height:420px;resize:none}</style><body><form><br>原材料长: <input id="max_weight" type="text" value="6000"><br>下料尺寸: <input id="weights" type="text" value="2300,1988,1050,601,503,459,359"><br>下料数量: <input id="nums" type="text" value="912,320,1248,320,912,320,1248"><br><br><button type="button" id="get_result">开始计算</button><br>计算结果:<br><textarea id="text_result"></textarea><br><br></form><script>function getResult(goal,limit){var loosen=getLoosen(limit,goal);var cb=[];for(var i=0;i<(goal.length+loosen.length);i++){cb.push([goal[i]||0,i])}while(true){var needAssist=false;for(var i of loosen){if(i[1]<0){needAssist=true}}if(needAssist){var min=0,min_index=null;for(var i=0;i<loosen.length;i++){if(loosen[i][1]<min){min=loosen[i][1];min_index=i}}var min2=Infinity,min_index2=null;for(var i=0;i<cb.length;i++){var num=loosen[min_index][0][i];if(num>=0)continue;var check=(getCheckNum(cb,loosen,i))/num;if(check<min2){min2=check;min_index2=i}}if(typeof min_index2=='number'){loosen[min_index][2]=min_index2;loosen[min_index][3]=cb[min_index2][0];updateMartix(loosen,min_index,min_index2)}else return false}else break}while(true){var max=0,max_index=null;for(var i=0;i<cb.length;i++){var check=getCheckNum(cb,loosen,i);if(check>max){max=check;max_index=i;break}}if(typeof max_index=='number'){var min=Infinity,min_index=null,min_index2=null;for(var i=0;i<loosen.length;i++){var bizhi=getBizhiNum(cb,loosen,i,max_index);if(typeof bizhi=='number'&&(bizhi<min||bizhi==min&&loosen[i][2]<min_index2)){min=bizhi;min_index=i;min_index2=loosen[i][2]}}if(typeof min_index=='number'){loosen[min_index][2]=max_index;loosen[min_index][3]=cb[max_index][0];updateMartix(loosen,min_index,max_index)}}else break}var result=[];for(var i=0;i<cb.length;i++)result.push(0);for(var i of loosen){result[i[2]]=i[1]}return result};function updateMartix(loosen,index1,index2){var list=loosen[index1],num=list[0][index2];for(var i=0;i<list[0].length;i++){list[0][i]/=num}list[1]/=num;for(var i=0;i<loosen.length;i++){if(i==index1)continue;var num2=loosen[i][0][index2];for(var j=0;j<loosen[i][0].length;j++){loosen[i][0][j]-=(loosen[index1][0][j]*num2)}loosen[i][1]-=loosen[index1][1]*num2}};function getBizhiNum(cb,loosen,index,maxIndex){var num=loosen[index][0][maxIndex];if(num<=0)return null;return loosen[index][1]/num};function getCheckNum(cb,loosen,index){var num=cb[index][0];for(var i=0;i<loosen.length;i++){num-=(loosen[i][3]*loosen[i][0][index])}return num};function getLoosen(limit,goal){var loosen=limit.slice(0);for(var i=0;i<limit.length;i++){for(var j=0;j<limit.length;j++){limit[i][0].push(i==j?1:0)}limit[i].push(i+goal.length);limit[i].push(0)}return loosen};function bag_program(weights,nums,max_weight){let weight_num=[];for(let i=0;i<max_weight;i++){weight_num.push([])}for(let ii=0;ii<weights.length;ii++){let L=weights[ii];let val=[];for(i=0;i<weights.length;i++){val.push(0)}for(i=L;i<max_weight+1;i=i+L){val[ii]++;if(val[ii]<=nums[ii]){weight_num[i-1].push(deepcopy(val))}}for(i=0;i<max_weight;i++){if(weight_num[i]){if(i+L<max_weight){for(let j in weight_num[i]){val=deepcopy(weight_num[i][j]);val[ii]++;if(val[ii]<=nums[ii]){weight_num[i+L].push(deepcopy(val))}}}}}}num_arrs=dellarrys(weight_num.flat());return num_arrs}function deepcopy(a){let demo=[];for(let i=0;i<a.length;i++){demo[i]=a[i]}return demo}function sumf(a,b){let re=[];for(let i=0;i<a.length;i++){if(b[i]>0){for(let j=0;j<b[i];j++){re.push(a[i])}}}return re}function sumarrys(weights,nums){let re=0;for(i=0;i<weights.length;i++){re+=weights[i]*nums[i]}return re}function sumar(weights,num){let re=[];for(i=0;i<weights.length;i++){re.push(weights[i]*num)}return re}function dellarrys(a){let obj={};a.forEach(item=>obj[item]=item);re=Object.values(obj);return re}document.getElementById('get_result').onclick=function(){let max_weight=parseInt(document.getElementById('max_weight').value);let weights=document.getElementById('weights').value.split(",").map(Number);let nums=document.getElementById('nums').value.split(",").map(Number);let text=document.getElementById('text_result');text.value="开始计算……\n开始动态规划，计算所有下料分布可能……";let num_arrs=bag_program(weights,nums,max_weight);text.value+="\n动态规划结束，开始线性规划选择最优分布……";num_arrs_T=[];for(let i=0;i<num_arrs[0].length;i++){num_arrs_T[i]=[]};for(let i=0;i<num_arrs.length;i++){for(let j=0;j<num_arrs[i].length;j++){num_arrs_T[j][i]=num_arrs[i][j]*-1}};goals=[];x=[];for(let i=0;i<num_arrs_T[0].length;i++){goals[i]=-1;x[i]="x"+i};limits=[];for(let i=0;i<num_arrs_T.length*2;i++){if(i<num_arrs_T.length){limits[i]=[num_arrs_T[i],nums[i]*-1]}};let result=getResult(goals,limits);if(!result){text.value+="\n计算停止，该线性规划无解";return}let Numbers=[];let z=0;j=0;l=0;for(let i=0;i<x.length;i++){if(result[i]!=0){j++;re=(Math.abs(Math.round(result[i])-result[i])<0.0001)?Math.round(result[i]):Math.ceil(result[i]);text.value+="\n"+j+"#：余"+(max_weight-sumarrys(weights,num_arrs[i]));text.value+="，需"+re+"根"+JSON.stringify(sumf(weights,num_arrs[i]));z+=re;l+=sumarrys(weights,num_arrs[i])*re;if(j<=1){Numbers=sumar(num_arrs[i],re)}else{Numbers=Numbers.map(function(item,index){return item+sumar(num_arrs[i],re)[index]})}}};text.value+="\n下料数量分别为："+JSON.stringify(Numbers);text.value+="\n所需原料总数目为："+z;text.value+="\n管材平均利用率为："+Math.round(l/z/max_weight*10000)/100+"%";text.value+="\n此程序仅供学习和参考，计算结果自行承担风险！"}</script></body></html>
