<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金属计算器</title>
</head>
<style>
    .home {
        /* color: black; */
        font-size: 16px;
        background-color: rgb(220, 220, 220);
        width: 300px;
        text-align: center;
        margin: auto;
        line-height: 40px;
        border: 100px;
    }
    input {
        width: 180px;
        height: 25px;
        text-align: right;
        border: 0px;

    }
    #select {
        font-size: 18px;
        border: 0px;
        background-color: transparent;
    }
    .foot {
        text-align: center;
        color: rgb(200, 200, 200);
        font-size: 8px;
    }
</style>
<body>
    <div class="home">
        品类：
        <select id="select" onchange="select_click();">
            <option selected>板材</option>
            <option>圆钢</option>
            <option>圆管</option>
        </select>
        <div id="TT">*厚度: <input id="T" type="text" value="" placeholder="0" onkeyup="text_input(this);">毫米</div>
        <div id="WW">*宽度: <input id="W" type="text" value="" placeholder="0" onkeyup="text_input(this);">毫米</div>
        <div id="DD" style="display: none;">*外径: <input id="D" type="text" placeholder="0" onkeyup="text_input(this);">毫米</div>
        <div id="LL">*长度: <input id="L" type="text" value="" placeholder="0" onkeyup="text_input(this);">米&nbsp;&nbsp;&nbsp;</div>
        <div>计算结果:<span id="text_result">0.000</span>kg</div>
    </div> 
    <div class="foot">本工具计算结果是理论估算值, <br>与实际测量值存在偏差, 仅供参考</div>
    <script>
        function text_input(obj){
            obj.value=obj.value.replace(/[^0-9\.]/g,'');
            let T = parseFloat(document.getElementById('T').value);
            let W = parseFloat(document.getElementById('W').value);
            let D = parseFloat(document.getElementById('D').value);
            let L = parseFloat(document.getElementById('L').value);
            let text = document.getElementById('text_result');
            let select = document.getElementById('select');
            if (select.value=="板材") {
                if(isNaN(T)==false && isNaN(W)==false && isNaN(L)==false){
                    text.innerHTML =Math.floor(T*W*L*0.00785*1000)/1000;
                }
            }
            if (select.value=="圆钢") {
                if(isNaN(D)==false && isNaN(L)==false){
                    text.innerHTML =Math.floor(D*D*L*0.00617*1000)/1000;
                }
            }
            if (select.value=="圆管") {
                if(isNaN(T)==false && isNaN(D)==false && isNaN(L)==false){
                    text.innerHTML =Math.floor(T*(D-T)*L*0.02466*1000)/1000;
                }
            }
        }
        function select_click(){
            let select = document.getElementById('select');
            document.getElementById('T').value="";
            document.getElementById('W').value="";
            document.getElementById('D').value="";
            document.getElementById('L').value="";
            document.getElementById('text_result').innerHTML="0.000";
            document.getElementById("TT").style.display="";
            document.getElementById("WW").style.display="";
            document.getElementById("LL").style.display="";
            document.getElementById("DD").style.display="";
            if (select.value=="板材") {
                document.getElementById("DD").style.display="none";
            }
            if (select.value=="圆钢") {
                document.getElementById("TT").style.display="none";
                document.getElementById("WW").style.display="none";
            }
            if (select.value=="圆管") {
                document.getElementById("WW").style.display="none";
            }
        }
    </script>
</body>
</html>
