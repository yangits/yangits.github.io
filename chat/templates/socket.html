<!doctype html>
<html>
<head>
    <title>最短websocket例子</title>
</head>
<body>
<h1>最短websocket例子，输入"[exit]"关闭连接</h1>
<div id="msg"></div>
<br>
<form id="form">
    <label for="text">Input: </label>
    <input type="text" id="text" autofocus>
</form>
<script>
      const log = (text, color) => {
        document.getElementById('msg').innerHTML += `<span style="color: ${color}">${text}</span><br>`;
      };

      const socket = new WebSocket('ws://127.0.0.1:5000/echo');

      socket.addEventListener('message', ev => {
        log('<<< ' + ev.data, 'blue');
      });
      document.getElementById('form').onsubmit = ev => {
        ev.preventDefault();
        const textField = document.getElementById('text');
        log('>>> 原始：' + textField.value, 'red');
        socket.send(textField.value);
        textField.value = '';
      };
    </script>
</body>
</html>
